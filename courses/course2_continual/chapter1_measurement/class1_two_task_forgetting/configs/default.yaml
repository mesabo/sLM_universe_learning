# Course 2 ch1 class1 — measurement of catastrophic forgetting on a two-task sequence.

course: course2_continual
class_id: chapter1_measurement_class1_two_task_forgetting
task: two_task
method: full-ft

backbone: sentence-transformers/all-MiniLM-L6-v2
seed: 42
mode: smoke
freeze_backbone: false

# Two tasks, trained sequentially. Both share a 4-output classification head.
# `label_remap` is applied to the dataset's native label -> new id in [0, num_labels).
# Rows whose label maps to null are dropped.
tasks:
  - name: ag_news
    hf_id: ag_news
    config: null
    split:
      train: train
      eval: test
    text_field: text
    label_field: label
    # AG News labels: 0=World, 1=Sports, 2=Business, 3=Sci/Tech (already 0..3)
    label_remap: {0: 0, 1: 1, 2: 2, 3: 3}

  - name: emotion
    hf_id: dair-ai/emotion
    config: null
    split:
      train: train
      eval: test
    text_field: text
    label_field: label
    # Emotion labels: 0=sadness, 1=joy, 2=love, 3=anger, 4=fear, 5=surprise.
    # Map to the same 4-output head; fear and surprise are dropped (null).
    label_remap: {0: 0, 1: 1, 2: 2, 3: 3, 4: null, 5: null}

num_labels: 4

limits:
  smoke:
    train_per_task: 2048
    eval_per_task: 512
    epochs_per_task: 2
  full:
    train_per_task: null
    eval_per_task: null
    epochs_per_task: 3

train:
  per_device_batch: 16
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_len: 128
  bf16: true
  fp16: false
  log_steps: 25

expected_band:
  smoke:
    avg_accuracy: [0.50, 1.0]
    acc_A_after_A: [0.70, 1.0]
    acc_A_after_B: [0.0, 0.85]
    acc_B_after_A: [0.0, 1.0]   # zero-shot on B before training; permissive
    acc_B_after_B: [0.40, 1.0]
    BWT: [-1.0, -0.05]
  full:
    avg_accuracy: [0.65, 1.0]
    acc_A_after_A: [0.85, 1.0]
    acc_A_after_B: [0.0, 0.80]
    acc_B_after_A: [0.0, 1.0]   # zero-shot on B before training; permissive
    acc_B_after_B: [0.70, 1.0]
    BWT: [-1.0, -0.10]
