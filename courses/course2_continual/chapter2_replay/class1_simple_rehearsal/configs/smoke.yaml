course: course2_continual
class_id: chapter2_replay_class1
task: experience_replay
method: simple_rehearsal
backbone: sentence-transformers/all-MiniLM-L6-v2
seed: 42
replay:
  buffer_capacity: 50
  mixing_ratio: 0.3
tasks:
  - name: ag_news
    dataset: ag_news
    split: train
    n_samples: 64
    eval_n: 32
    label_col: label
    text_col: text
    n_labels: 4
  - name: emotion
    dataset: dair-ai/emotion
    split: train
    n_samples: 64
    eval_n: 32
    label_col: label
    text_col: text
    n_labels: 6
training:
  max_epochs: 1
  batch_size: 16
  lr: 2.0e-5
  warmup_ratio: 0.0
  max_length: 64
  save_strategy: "epoch"
  save_total_limit: 1
expected_band:
  bwt: [-1.0, 1.0]
  final_acc: [0.0, 1.0]
  buffer_fill_rate: [0.0, 1.0]
