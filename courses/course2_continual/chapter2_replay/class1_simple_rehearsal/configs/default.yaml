course: course2_continual
class_id: chapter2_replay_class1
task: experience_replay
method: simple_rehearsal
backbone: sentence-transformers/all-MiniLM-L6-v2
seed: 42
replay:
  buffer_capacity: 500
  mixing_ratio: 0.3
tasks:
  - name: ag_news
    dataset: ag_news
    split: train
    n_samples: 2000
    eval_n: 200
    label_col: label
    text_col: text
    n_labels: 4
  - name: emotion
    dataset: dair-ai/emotion
    split: train
    n_samples: 2000
    eval_n: 200
    label_col: label
    text_col: text
    n_labels: 6
training:
  max_epochs: 3
  batch_size: 32
  lr: 2.0e-5
  warmup_ratio: 0.1
  max_length: 128
  save_strategy: "epoch"
  save_total_limit: 2
expected_band:
  bwt: [-0.15, 0.05]
  final_acc: [0.6, 1.0]
  buffer_fill_rate: [0.9, 1.0]
