# Course 2 ch4 class1 — parameter isolation (LoRA-per-task) on AG News -> Emotion.

course: course2_continual
class_id: chapter4_isolation_class1_lora_per_task
task: two_task
method: iso-r16

backbone: sentence-transformers/all-MiniLM-L6-v2
seed: 42
mode: smoke

tasks:
  - name: ag_news
    hf_id: ag_news
    config: null
    split:
      train: train
      eval: test
    text_field: text
    label_field: label
    label_remap: {0: 0, 1: 1, 2: 2, 3: 3}

  - name: emotion
    hf_id: dair-ai/emotion
    config: null
    split:
      train: train
      eval: test
    text_field: text
    label_field: label
    label_remap: {0: 0, 1: 1, 2: 2, 3: 3, 4: null, 5: null}

num_labels: 4

limits:
  smoke:
    train_per_task: 2048
    eval_per_task: 512
    epochs_per_task: 2
  full:
    train_per_task: null
    eval_per_task: null
    epochs_per_task: 3

# LoRA per task. Explicit attention-only target_modules — the auto-detect
# returns "dense" for BERT, but that string matches too many sub-modules
# (intermediate.dense, output.dense, pooler.dense, classifier.dense) and
# conflicts with modules_to_save=["classifier"].
# modules_to_save makes the head per-adapter (not shared) — without this,
# Task B's training rewrites the head used to classify Task A.
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["query", "key", "value"]
  modules_to_save: ["classifier"]
  bias: "none"

train:
  per_device_batch: 16
  grad_accum: 1
  lr: 5.0e-4    # LoRA tolerates / wants ~10x the LR of full FT
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_len: 128
  bf16: true
  fp16: false
  log_steps: 25

expected_band:
  smoke:
    avg_accuracy: [0.50, 1.0]
    acc_A_after_A: [0.55, 1.0]
    acc_B_after_B: [0.35, 1.0]
    acc_A_after_B: [0.55, 1.0]
    BWT: [-0.05, 0.05]
    n_adapters: [2, 2]
    trainable_ratio_pct: [0.0, 5.0]
  full:
    avg_accuracy: [0.80, 1.0]
    acc_A_after_A: [0.85, 1.0]
    acc_B_after_B: [0.65, 1.0]
    acc_A_after_B: [0.85, 1.0]
    BWT: [-0.05, 0.05]
    n_adapters: [2, 2]
    trainable_ratio_pct: [0.0, 5.0]
