# Course 0 ch1 class1 — HF ecosystem tour, sanity check.

course: course0_bridge
class_id: chapter1_hf_tour_class1_automodel
task: sanity
method: load

# Backbone to inspect. Override at the CLI: backbone=HuggingFaceTB/SmolLM2-135M-Instruct
backbone: sentence-transformers/all-MiniLM-L6-v2

# Prompts the iteration loop cycles through.
# Use a single string OR a list. With a list, pass `i` runs prompts[i % len(prompts)].
# This lets you measure how latency scales with input length without leaving the lesson.
# `prompt` (singular) is still accepted for backward compat — if both are set, `prompts` wins.
prompts:
  - "Hi."
  - "Hello world from sLM Universe Learning."
  - "Explain in two sentences why small language models are useful for on-device inference, edge deployment, and privacy-preserving applications where round-trips to a cloud LLM would be slow or impossible."

# Iteration knobs — the script runs `n_passes` timed forward passes after
# `warmup` untimed ones. Use n_passes >= 5 to get useful latency stats; bump
# warmup to >=2 on a cold GPU so cuDNN init doesn't skew the first sample.
iterations:
  n_passes: 1
  warmup: 0

# Expected metric bands. The eval exits non-zero if anything falls outside.
# Latency bands are deliberately permissive — the lesson is "it ran" / "shape
# is right", not "it ran in <X> ms" (machines vary too much).
expected_band:
  forward_ok: [1, 1]
  hidden_size_ok: [1, 1]
  n_passes_ran: [1, 100000]
  mean_latency_ms: [0.0, 600000.0]
