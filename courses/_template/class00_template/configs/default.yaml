# Class config — single source of truth for this lesson.
#
# Copy this file when starting a new class. Override any field at the CLI:
#   python train.py --config configs/default.yaml backbone=BAAI/bge-small-en-v1.5
#
# Required keys:
#   course / class_id / task / method   — used to lay out result JSON paths
#   backbone                            — must match an entry in configs/backbones.yaml
#   expected_band                       — per-metric [lo, hi]; eval exits non-zero outside the band

course: courseX_<short_name>
class_id: chapterY_<chapter_slug>_classZ_<class_slug>
task: <task_name>
method: <method_name>

backbone: sentence-transformers/all-MiniLM-L6-v2
seed: 42
mode: smoke

# Class-specific knobs go below; group by purpose. Keep names stable across classes
# so a single launcher grid can sweep over multiple classes.

train:
  per_device_batch: 8
  lr: 2.0e-5
  epochs: 1
  max_len: 128

# Bands are required so eval.py can enforce the contract.
expected_band:
  smoke:
    metric_a: [0.0, 1.0]
  full:
    metric_a: [0.0, 1.0]
