# Course 1 ch1 class2 — full SFT of SmolLM2-135M-Instruct on smoltalk subset.

course: course1_finetuning
class_id: chapter1_full_ft_class2_decoder_sft
task: smoltalk
method: sft

backbone: HuggingFaceTB/SmolLM2-135M-Instruct
seed: 42
mode: smoke

dataset:
  hf_id: HuggingFaceTB/smoltalk
  config: smol-magpie-ultra
  split: train
  messages_field: messages
  eval_holdout: 64

limits:
  smoke:
    train: 1024
    max_steps: 50
  full:
    train: 8192
    max_steps: 500

train:
  per_device_batch: 2
  grad_accum: 2
  lr: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.0
  max_seq_length: 1024
  bf16: true
  packing: false
  log_steps: 10

expected_band:
  smoke:
    train_loss_final: [0, 6.0]
    eval_loss: [0, 6.0]
    loss_decreased: [1, 1]
  full:
    train_loss_final: [0, 4.0]
    eval_loss: [0, 4.0]
    loss_decreased: [1, 1]
