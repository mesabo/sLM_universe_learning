# Course 1 ch5 class1 — contrastive fine-tuning of an encoder via MNRL.

course: course1_finetuning
class_id: chapter5_embedding_ft_class1_contrastive
task: quora
method: mnrl-b64

backbone: sentence-transformers/all-MiniLM-L6-v2
seed: 42
mode: smoke

dataset:
  hf_id: sentence-transformers/quora-duplicates
  config: pair    # gives `(anchor, positive)` columns
  split: train
  anchor_field: anchor
  positive_field: positive
  eval_holdout: 256

limits:
  smoke:
    train: 2048
    max_steps: 50
  full:
    train: 16384
    max_steps: 500

train:
  per_device_batch: 64
  grad_accum: 1
  lr: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: false        # fp32 by default; many encoders dislike bf16 contrastive math
  log_steps: 10

expected_band:
  smoke:
    mrr: [0.40, 1.0]
    recall_at_1: [0.30, 1.0]
    recall_at_5: [0.55, 1.0]
    loss_decreased: [1, 1]
    train_loss_final: [0.0, 5.0]
  full:
    mrr: [0.65, 1.0]
    recall_at_1: [0.55, 1.0]
    recall_at_5: [0.80, 1.0]
    loss_decreased: [1, 1]
    train_loss_final: [0.0, 3.0]
