name: CI — Lint and Test All Projects

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test-projects:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [01_smolsearch, 02_ragify, 03_agentflow, 04_llmops_baseline]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: courses/projects/${{ matrix.project }}/requirements.txt

      - name: Install ${{ matrix.project }} dependencies
        run: pip install -r courses/projects/${{ matrix.project }}/requirements.txt pytest

      - name: Run ${{ matrix.project }} tests
        env:
          PYTHONPATH: courses/projects/${{ matrix.project }}
        run: pytest courses/projects/${{ matrix.project }}/tests/ -v --tb=short
